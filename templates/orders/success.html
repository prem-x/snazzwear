{% extends "base.html" %}

{% block content %}
<section style="padding: 100px 8%; text-align: center; min-height: 60vh; background: var(--bg-primary);">
    <h2 style="font-family: var(--font-heading); font-size: 32px; letter-spacing: 2px; margin-bottom: 30px; color: var(--text-primary);">PAYMENT SUCCESSFUL</h2>
    
    <div style="max-width: 600px; margin: 0 auto; background: var(--bg-secondary); border: 1px solid var(--border-color); padding: 50px 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
        <div style="margin-bottom: 25px; color: var(--accent);">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-check-circle"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        </div>
        <p style="font-size: 20px; margin-bottom: 10px; color: var(--text-primary); font-family: var(--font-body); font-weight: 600;">Thank you for your order, {{ order.first_name|default:"Guest" }}!</p>
        <p style="color: var(--text-secondary); margin-bottom: 40px; font-family: var(--font-body); font-size: 15px;">Your Order ID is: <strong style="color: var(--text-primary);">#{{ order.id }}</strong></p>
        
        <a href="{% url 'home' %}" style="display: inline-block; padding: 14px 38px; background: var(--accent-gradient); color: white; text-decoration: none; font-family: var(--font-heading); font-weight: 700; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; border-radius: 30px; box-shadow: 0 4px 15px var(--accent-glow); transition: var(--transition-smooth);" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 20px rgba(255, 95, 54, 0.45)';" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px var(--accent-glow)';">CONTINUE SHOPPING</a>
    </div>
</section>
{% endblock %}
